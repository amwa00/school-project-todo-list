<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Todos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <!-- Implementera bootstrap -->
  <div id="app" class="d-flex flex-column justify-content-center align-items-center">
    <div class="todo-container shadow d-flex flex-column align-items-center w-25 mt-5 mb-3 p-3 rounded-3">
      <h2 class="text-center">TASKS</h2>
      <ul id="todo-list" class="list-unstyled align-self-start w-100 m-0"></ul>

      <form id="task-form" class="my-0 mt-1 d-flex flex-column justify-content-center align-items-center w-100">
        <input type="text" class="input w-100 mw-100 rounded border-0 px-2 py-1" id="new-task"
          placeholder="New task...">
        <input type="submit" class="btn btn-primary mt-1" value="Add task">
      </form>
    </div>

    <div class="todo-container shadow d-flex flex-column align-items-center w-25 my-3 p-3 rounded-3">
      <h2 class="text-center">FINISHED TASKS</h2>
      <ul id="done-list" class="list-unstyled align-self-start w-100 m-0"></ul>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
